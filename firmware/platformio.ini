; SaliGuard - Firmware ESP32 (khối /firmware)
; Đọc DS18B20 + TDS, gửi telemetry qua 4G/MQTT, log microSD, khung điều khiển 2 DRV8825.
; Sơ đồ phần cứng: xem README.md (pin map khớp "Sơ đồ nối dây đầy đủ").

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Modem TDM-4G-V2 (A7680/A7682) tương thích hồ sơ SIM7600 trong TinyGSM.
build_flags =
	-D TINY_GSM_MODEM_SIM7600
	-D TINY_GSM_RX_BUFFER=1024

lib_deps =
	knolleary/PubSubClient@^2.8
	bblanchon/ArduinoJson@^7.2.0
	vshymanskyy/TinyGSM@^0.12.0
	milesburton/DallasTemperature@^4.0.3
	paulstoffregen/OneWire@^2.3.8
