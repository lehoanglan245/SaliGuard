# SaliGuard - Triển khai production trên VPS (toàn bộ backend stack).
#
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml ps
#   docker compose -f docker-compose.prod.yml logs -f backend
#
# Cần file .env (xem .env.prod.example) đặt cạnh file này.
# Kiến trúc:
#   Internet --443/80--> caddy --(reverse proxy)--> backend:3000   (HTTPS tự động)
#   ESP32 ----8883 TLS----> mqtt                                    (MQTT over TLS)
#   backend --> db:5432, mqtt:1883 (nội bộ), ai_engine:8000 (nội bộ)
# DB / AI Engine KHÔNG mở ra ngoài Internet.

services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: saliguard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Không publish cổng 5432 ra ngoài — chỉ truy cập trong mạng docker.

  mqtt:
    image: eclipse-mosquitto:2
    container_name: saliguard-mqtt
    restart: unless-stopped
    ports:
      - "8883:8883" # TLS công khai cho thiết bị ngoài hiện trường
    volumes:
      - ./infra/mosquitto/mosquitto.prod.conf:/mosquitto/config/mosquitto.conf:ro
      - ./infra/mosquitto/passwd:/mosquitto/config/passwd:ro
      - ./infra/mosquitto/certs:/mosquitto/certs:ro
      - mqtt-data:/mosquitto/data

  ai_engine:
    build: ./ai_engine
    container_name: saliguard-ai
    restart: unless-stopped
    environment:
      MODEL_PATH: /models/xgboost_model.json
      MODEL_48H_PATH: /models/xgboost_model_48h.json
    volumes:
      # Đặt file model vào ./ai_engine/models/ trên VPS (nếu chưa có -> mock mode).
      - ./ai_engine/models:/models:ro
    # Không publish cổng — chỉ backend gọi nội bộ.

  backend:
    build: ./backend
    container_name: saliguard-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
      ai_engine:
        condition: service_started
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: db
      DB_PORT: 5432
      MQTT_URL: mqtt://mqtt:1883 # nội bộ docker, không cần TLS
      AI_ENGINE_URL: http://ai_engine:8000/predict
      API_PORT: 3000
      REAL_STATION_ID: ${REAL_STATION_ID}
      CORS_ORIGIN: ${CORS_ORIGIN}
    # Không publish 3000 — Caddy reverse proxy.

  caddy:
    image: caddy:2-alpine
    container_name: saliguard-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      API_DOMAIN: ${API_DOMAIN}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - backend

volumes:
  db-data:
  mqtt-data:
  caddy-data:
  caddy-config:
